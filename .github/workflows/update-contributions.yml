name: Update contributions and rebuild

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC (optional)

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Removed debug step

      - name: Install dependencies
        run: npm ci

      - name: Fetch contributions JSON
        env:
          GITHUB_TOKEN: ${{ secrets.CONTRIB_PAT }} # create this secret with a PAT that can read the GraphQL API
          GITHUB_USERNAME: Corelocked
          CONTRIB_YEARS: 2024,2025,2026
        run: |
          node scripts/fetchContributions.js

      - name: Commit contributions.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/contributions.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update contributions.json [skip ci]" || true
            # Ensure we integrate any remote changes first to avoid non-fast-forward errors
            BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git fetch origin ${BRANCH} || true
            git pull --rebase --autostash origin ${BRANCH} || true
            git push origin HEAD:refs/heads/${BRANCH} || git push --force-with-lease origin HEAD:refs/heads/${BRANCH}
          else
            echo "No changes to contributions.json"
          fi

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        run: npm run deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
