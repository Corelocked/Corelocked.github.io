name: Update contributions and rebuild

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC (optional)

jobs:
  fetch-and-deploy:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch contributions JSON
        env:
          GITHUB_TOKEN: ${{ secrets.CONTRIB_PAT }} # create this secret with a PAT that can read the GraphQL API
          GITHUB_USERNAME: Corelocked
        run: |
          node scripts/fetchContributions.js

      - name: Build
        run: npm run build

      - name: Deploy branch-backed site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/contributions.json docs
          if ! git diff --staged --quiet; then
            git commit -m "chore: update site [skip ci]"
            git pull --rebase --autostash origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          else
            echo "No site changes to deploy"
          fi
