<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirect</title>
    <script type="text/javascript">
      // Store the original path in sessionStorage and redirect to root
      sessionStorage.redirect = location.pathname + location.search + location.hash;
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body>
  </body>
</html>
